<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF压缩 - 免费在线压缩</title>
    <meta name="description" content="免费在线PDF压缩工具，压缩PDF文件大小，节省存储空间，无需安装软件">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <i class="fas fa-file-pdf"></i>
                <h1>PDF工具在线</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">首页</a></li>
                    <li><a href="pdf-to-word.html">PDF转Word</a></li>
                    <li><a href="word-to-pdf.html">Word转PDF</a></li>
                    <li><a href="pdf-compress.html">PDF压缩</a></li>
                    <li><a href="pdf-merge.html">PDF合并</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="tool-page">
            <div class="container">
                <h2>PDF压缩</h2>
                <p>压缩PDF文件大小，节省存储空间</p>
                
                <div class="tool-container">
                    <div class="upload-area" id="uploadArea">
                        <div class="upload-icon">
                            <i class="fas fa-compress"></i>
                        </div>
                        <p>点击或拖拽PDF文件到此处</p>
                        <input type="file" id="fileInput" accept=".pdf" multiple>
                    </div>

                    <div class="compression-options">
                        <h3>压缩质量</h3>
                        <div class="options">
                            <label>
                                <input type="radio" name="quality" value="low" checked>
                                <span>低质量（压缩率最高）</span>
                            </label>
                            <label>
                                <input type="radio" name="quality" value="medium">
                                <span>中等质量（推荐）</span>
                            </label>
                            <label>
                                <input type="radio" name="quality" value="high">
                                <span>高质量（压缩率较低）</span>
                            </label>
                        </div>
                    </div>

                    <div class="file-list" id="fileList">
                        <h3>已选择的文件</h3>
                        <ul id="files"></ul>
                    </div>

                    <div class="actions">
                        <button id="compressBtn" class="btn btn-primary">
                            <i class="fas fa-compress"></i> 开始压缩
                        </button>
                        <button id="clearBtn" class="btn btn-secondary">
                            <i class="fas fa-trash"></i> 清空列表
                        </button>
                    </div>

                    <div class="progress" id="progress">
                        <div class="progress-bar"></div>
                        <span class="progress-text">0%</span>
                    </div>

                    <div class="results" id="results">
                        <h3>压缩结果</h3>
                        <div id="resultList"></div>
                    </div>
                </div>

                <div class="tips">
                    <h3>使用提示</h3>
                    <ul>
                        <li>支持批量压缩多个PDF文件</li>
                        <li>文件大小建议不超过100MB</li>
                        <li>压缩后文件大小约为原文件的30%-60%</li>
                        <li>高质量模式适合需要保留清晰图片的文档</li>
                    </ul>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 PDF工具在线. 保留所有权利.</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
