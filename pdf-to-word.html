<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF转Word - 免费在线转换</title>
    <meta name="description" content="免费在线PDF转Word工具，将PDF文件转换为可编辑的Word文档，无需安装软件">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <i class="fas fa-file-pdf"></i>
                <h1>PDF工具在线</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">首页</a></li>
                    <li><a href="pdf-to-word.html">PDF转Word</a></li>
                    <li><a href="word-to-pdf.html">Word转PDF</a></li>
                    <li><a href="pdf-compress.html">PDF压缩</a></li>
                    <li><a href="pdf-merge.html">PDF合并</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="tool-page">
            <div class="container">
                <h2>PDF转Word</h2>
                <p>将PDF文件转换为可编辑的Word文档</p>
                
                <div class="tool-container">
                    <div class="upload-area" id="uploadArea">
                        <div class="upload-icon">
                            <i class="fas fa-file-pdf"></i>
                        </div>
                        <p>点击或拖拽PDF文件到此处</p>
                        <input type="file" id="fileInput" accept=".pdf" multiple>
                    </div>

                    <div class="file-list" id="fileList">
                        <h3>已选择的文件</h3>
                        <ul id="files"></ul>
                    </div>

                    <div class="actions">
                        <button id="convertBtn" class="btn btn-primary">
                            <i class="fas fa-arrow-right"></i> 开始转换
                        </button>
                        <button id="clearBtn" class="btn btn-secondary">
                            <i class="fas fa-trash"></i> 清空列表
                        </button>
                    </div>

                    <div class="progress" id="progress">
                        <div class="progress-bar"></div>
                        <span class="progress-text">0%</span>
                    </div>

                    <div class="results" id="results">
                        <h3>转换结果</h3>
                        <div id="resultList"></div>
                    </div>
                </div>

                <div class="tips">
                    <h3>使用提示</h3>
                    <ul>
                        <li>支持批量转换多个PDF文件</li>
                        <li>文件大小建议不超过50MB</li>
                        <li>扫描件PDF转换后仍为图片格式</li>
                        <li>转换后的文档会保留原格式</li>
                    </ul>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 PDF工具在线. 保留所有权利.</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
